<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lottie Player SPA</title>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    h1 {
      color: #172b4d;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6b778c;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .controls {
      width: 100%;
      max-width: 720px;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(9, 30, 66, 0.12);
      margin-bottom: 24px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid #dfe1e6;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #0052cc;
    }
    button {
      padding: 10px 20px;
      background: #0052cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover { background: #0747a6; }
    button:disabled {
      background: #a5adba;
      cursor: not-allowed;
    }
    button.secondary {
      background: #f4f5f7;
      color: #42526e;
    }
    button.secondary:hover { background: #ebecf0; }
    .options {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      color: #42526e;
    }
    .options label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .player-container {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(9, 30, 66, 0.12);
      padding: 24px;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .status {
      color: #6b778c;
      font-size: 14px;
      text-align: center;
    }
    .error {
      color: #de350b;
      background: #ffebe6;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
    }
    lottie-player {
      width: 100%;
      max-width: 500px;
      height: auto;
    }
    .samples {
      margin-top: 12px;
      font-size: 12px;
      color: #6b778c;
    }
    .samples a {
      color: #0052cc;
      cursor: pointer;
      text-decoration: none;
      margin-right: 8px;
    }
    .samples a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>🎬 Lottie Player</h1>
  <p class="subtitle">Enter a URI to play a Lottie animation</p>

  <div class="controls">
    <div class="input-row">
      <input
        type="text"
        id="uriInput"
        placeholder="Enter Lottie JSON URL (e.g., https://.../animation.json)"
      />
      <button id="loadBtn">Load</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>

    <div class="options">
      <label><input type="checkbox" id="loopChk" checked /> Loop</label>
      <label><input type="checkbox" id="autoplayChk" checked /> Autoplay</label>
      <label>Speed:
        <input type="number" id="speedInput" value="1" min="0.1" max="5" step="0.1" style="width: 60px; padding: 4px;" />
      </label>
      <label>Background:
        <input type="color" id="bgInput" value="#ffffff" />
      </label>
    </div>

    <div class="samples">
      Samples:
      <a data-uri="https://assets10.lottiefiles.com/packages/lf20_iv4dsx3q.json">Loading</a>
      <a data-uri="https://assets1.lottiefiles.com/packages/lf20_usmfx6bp.json">Checkmark</a>
      <a data-uri="https://assets3.lottiefiles.com/packages/lf20_yyjaansa.json">Heart</a>
    </div>
  </div>

  <div class="player-container" id="playerContainer">
    <p class="status">Enter a URL and click "Load" to start</p>
  </div>

  <script>
    const uriInput = document.getElementById('uriInput');
    const loadBtn = document.getElementById('loadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const loopChk = document.getElementById('loopChk');
    const autoplayChk = document.getElementById('autoplayChk');
    const speedInput = document.getElementById('speedInput');
    const bgInput = document.getElementById('bgInput');
    const playerContainer = document.getElementById('playerContainer');

    // SPA routing: read Lottie URI from ?src= query parameter
    function getUriFromHash() {
      const params = new URLSearchParams(window.location.search);
      return params.get('src') || '';
    }

    function updateUrlParam(uri) {
      const url = new URL(window.location);
      if (uri) url.searchParams.set('src', uri);
      else url.searchParams.delete('src');
      window.history.replaceState({}, '', url);
    }

    async function loadLottie(uri) {
      if (!uri || !uri.trim()) {
        showStatus('Please enter a URL');
        return;
      }

      showStatus('Loading...');

      try {
        // Validate URL and pre-fetch JSON
        const res = await fetch(uri);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const data = await res.json();

        // Check basic Lottie JSON structure
        if (!data.v || !data.layers) {
          throw new Error('Not a valid Lottie JSON file');
        }

        renderPlayer(uri);
        updateUrlParam(uri);
      } catch (err) {
        showError(`Failed to load: ${err.message}`);
      }
    }

    function renderPlayer(uri) {
      playerContainer.innerHTML = '';
      playerContainer.style.background = bgInput.value;

      const player = document.createElement('lottie-player');
      player.setAttribute('src', uri);
      player.setAttribute('background', 'transparent');
      player.setAttribute('speed', speedInput.value);
      if (loopChk.checked) player.setAttribute('loop', '');
      if (autoplayChk.checked) player.setAttribute('autoplay', '');
      player.style.width = '100%';
      player.style.maxWidth = '500px';

      player.addEventListener('error', () => {
        showError('Lottie player could not play the animation');
      });

      playerContainer.appendChild(player);
    }

    function showStatus(msg) {
      playerContainer.innerHTML = `<p class="status">${msg}</p>`;
    }

    function showError(msg) {
      playerContainer.innerHTML = `<div class="error">⚠️ ${msg}</div>`;
    }

    // Event bindings
    loadBtn.addEventListener('click', () => loadLottie(uriInput.value));
    uriInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadLottie(uriInput.value);
    });
    clearBtn.addEventListener('click', () => {
      uriInput.value = '';
      updateUrlParam('');
      showStatus('Enter a URL and click "Load" to start');
    });

    // Reflect option changes immediately
    [loopChk, autoplayChk, speedInput, bgInput].forEach(el => {
      el.addEventListener('change', () => {
        if (uriInput.value) renderPlayer(uriInput.value);
      });
    });

    // Sample links
    document.querySelectorAll('.samples a').forEach(a => {
      a.addEventListener('click', () => {
        uriInput.value = a.dataset.uri;
        loadLottie(a.dataset.uri);
      });
    });

    // Initial load: read src from URL parameter
    window.addEventListener('DOMContentLoaded', () => {
      const initialUri = getUriFromHash();
      if (initialUri) {
        uriInput.value = initialUri;
        loadLottie(initialUri);
      }
    });
  </script>
</body>
</html>
